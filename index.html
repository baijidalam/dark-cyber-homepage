<!DOCTYPE html>
<html>
<head>
    <title>My Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        #background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.postimg.cc/s22HjP4x/IMG-6403.avif') center/cover no-repeat;
            z-index: -1;
            transition: background-position 0.1s;
        }
        #background:hover {
            background-position: 50% 20%;
        }
        .top-bar {
            position: fixed;
            top: 30px;
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 0;
            z-index: 1000;
            scrollbar-width: none;
        }
        .top-bar::-webkit-scrollbar { display: none; }
        
        .shortcuts {
            display: inline-flex;
            gap: 15px;
            padding: 0 15px;
        }
        .shortcut {
            text-decoration: none;
            color: white;
            text-align: center;
            width: 48px;
        }
        .shortcut img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            padding: 1px;
        }
        .shortcut span {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            text-shadow: 0 0 5px black;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="background"></div>

    <div class="top-bar">
        <div class="shortcuts" id="shortcutsContainer"></div>
    </div>

    <script>
        const container = document.getElementById('shortcutsContainer');

        let shortcuts = [
            {name: "GitHub", url: "https://github.com"},
            {name: "Post Image", url: "https://postimages.com"},
            {name: "Terabox", url: "https://terabox.com"},
            {name: "YouTube", url: "https://youtube.com"},
            {name: "Facebook", url: "https://facebook.com"},
            {name: "Instagram", url: "https://instagram.com"},
            {name: "X", url: "https://x.com"},
            {name: "WhatsApp", url: "https://web.whatsapp.com"}
        ];

        function loadShortcuts() {
            container.innerHTML = '';
            
            shortcuts.forEach((site, index) => {
                const a = document.createElement('a');
                a.href = site.url;
                a.className = 'shortcut';
                a.target = "_blank";
                a.innerHTML = `
                    <img src="https://www.google.com/s2/favicons?sz=64&domain=${site.url}" 
                         onerror="this.src='https://via.placeholder.com/30?text=🔗'" alt="${site.name}">
                    <span>${site.name}</span>
                `;

                let pressTimer;
                a.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        if (confirm(`${site.name} রিমুভ করবেন?`)) {
                            shortcuts.splice(index, 1);
                            localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
                            loadShortcuts();
                        }
                    }, 800);
                });
                a.addEventListener('touchend', () => clearTimeout(pressTimer));
                a.addEventListener('touchmove', () => clearTimeout(pressTimer));

                container.appendChild(a);
            });

            const addBtn = document.createElement('a');
            addBtn.className = 'shortcut';
            addBtn.innerHTML = `
                <div style="width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.9);display:flex;align-items:center;justify-center;font-size:20px;">+</div>
                <span>Add</span>
            `;
            addBtn.onclick = addNewShortcut;
            container.appendChild(addBtn);
        }

        function addNewShortcut() {
            const url = prompt("সাইটের পুরো লিংক দিন:");
            if (!url) return;
            let name = prompt("সাইটের নাম কী?", "");
            if (!name) name = url.replace(/^https?:\/\//, '').split('/')[0];

            shortcuts.push({name: name, url: url});
            localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
            loadShortcuts();
        }

        const saved = localStorage.getItem('myShortcuts');
        if (saved) shortcuts = JSON.parse(saved);

        loadShortcuts();
    </script>


    <!-- ==================== DYNAMIC GREETING (Bottom) ==================== -->

<div id="status" class="neon-greeting-bottom">SYSTEM INITIALIZING...</div>

<style>
    .neon-greeting-bottom {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: 2px;
        padding: 10px 25px;
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(10px);
        display: inline-block;
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        z-index: 9999;
        text-align: center;
        white-space: nowrap;
    }
</style>

<script>
    function updateDynamicGreeting() {
        const statusBox = document.getElementById('status');
        const now = new Date();
        const hour = now.getHours();
        let greeting = "";
        let neonColor = "";

        if (hour >= 5 && hour < 12) {
            greeting = "🌅 Good Morning 🌞 ,BAIJID";
            neonColor = "#39ff14";
        } 
        else if (hour >= 12 && hour < 17) {
            greeting = "☀️ Good Afternoon 🌤️, BAIJID";
            neonColor = "#00f2ff";
        } 
        else if (hour >= 17 && hour < 21) {
            greeting = "🌆 Good Evening 🌟, BAIJID";
            neonColor = "#ff00ff";
        } 
        else {
            greeting = "🌙 Good Night🌌, BAIJID";
            neonColor = "#bc13fe";
        }

        statusBox.innerText = greeting;
        statusBox.style.color = neonColor;
        statusBox.style.borderColor = neonColor;
        statusBox.style.textShadow = `0 0 12px ${neonColor}`;
        statusBox.style.boxShadow = `0 0 20px ${neonColor}50`;
    }

    // পেজ লোড হলেই চালু
    window.onload = updateDynamicGreeting;

    // প্রতি ১০ মিনিটে আপডেট
    setInterval(updateDynamicGreeting, 600000);
</script>

<!-- ==================== END ==================== -->
</body>
</html>
